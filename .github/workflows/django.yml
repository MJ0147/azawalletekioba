name: Django CI

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 4
      matrix:
        python-version: ["3.11"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v3
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install Dependencies
      working-directory: store
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Validate database connection string
      env:
        COCKROACHDB_URL: ${{ vars.COCKROACHDB_URL || secrets.COCKROACHDB_URL }}
      run: |
        if [ -z "${COCKROACHDB_URL}" ]; then
          echo "COCKROACHDB_URL is not set. Configure repository variable COCKROACHDB_URL (preferred) or secret COCKROACHDB_URL."
          exit 1
        fi

    - name: Run Tests
      working-directory: store
      env:
        COCKROACHDB_URL: ${{ vars.COCKROACHDB_URL || secrets.COCKROACHDB_URL }}
        DJANGO_SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
        TON_API_KEY: ${{ secrets.TON_API_KEY }}
        SOLANA_API_KEY: ${{ secrets.SOLANA_API_KEY }}
      run: |
        python manage.py test
