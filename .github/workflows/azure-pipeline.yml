name: Azure Deploy Pipeline

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: azure-deploy-main
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: store
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: pip install -r requirements.txt

      - name: Run Django tests
        run: python manage.py test --settings=store_service.settings_test

  validate-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install frontend dependencies
        run: pip install -r frontend/requirements.txt

      - name: Check frontend app imports
        run: python -c "import sys; sys.path.insert(0, 'frontend'); import fastapi, uvicorn, jinja2; print('Frontend imports OK')"

  deploy-backend:
    runs-on: ubuntu-latest
    needs: [validate-backend, validate-frontend]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy backend to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_BACKEND_APP }}
          package: ./language_academy

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: [validate-backend, validate-frontend]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy frontend to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_FRONTEND_APP }}
          package: ./frontend
