name: Deploy to DigitalOcean

on:
  release:
    types: [published]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Checkout code at the release commit
      - name: Checkout repository
        uses: actions/checkout@v3

      # Log in to DockerHub
      - name: Log in to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Build backend image
      - name: Build backend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/backend:${{ github.ref_name }} ./language_academy
          docker push ${{ secrets.DOCKER_USERNAME }}/backend:${{ github.ref_name }}

      # Build frontend image
      - name: Build frontend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/frontend:${{ github.ref_name }} ./frontend
          docker push ${{ secrets.DOCKER_USERNAME }}/frontend:${{ github.ref_name }}

      # Render App Spec
      - name: Render App Spec
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          sed "s|__DOCKER_USERNAME__|${DOCKER_USERNAME}|g; s|__TAG__|${RELEASE_TAG}|g" do-app-spec.yaml > do-app-spec.rendered.yaml

      # Deploy to DigitalOcean
      - name: Deploy to DigitalOcean
        uses: digitalocean/app-action@v2
        with:
          token: ${{ secrets.DO_API_TOKEN }}
          app_spec: ./do-app-spec.rendered.yaml
