name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  packages: write

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r store/requirements.txt

      - name: Validate database connection string
        env:
          COCKROACHDB_URL: ${{ vars.COCKROACHDB_URL || secrets.COCKROACHDB_URL }}
        run: |
          if [ -z "${COCKROACHDB_URL}" ]; then
            echo "COCKROACHDB_URL is not set. Configure repository variable COCKROACHDB_URL (preferred) or secret COCKROACHDB_URL."
            exit 1
          fi

      - name: Run Django tests
        env:
          COCKROACHDB_URL: ${{ vars.COCKROACHDB_URL || secrets.COCKROACHDB_URL }}
        run: |
          cd store
          python manage.py test

  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Inject environment
        run: |
          echo "NEXT_PUBLIC_BACKEND_URL=${{ secrets.BACKEND_URL_PROD }}" >> frontend/.env.production

      - name: Install dependencies
        run: |
          cd frontend
          npm install

      - name: Build Next.js frontend
        run: |
          cd frontend
          npm run build

  deploy:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image names
        id: prep
        run: |
          REPO_LOWER=$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')
          echo "repo_lower=${REPO_LOWER}" >> "$GITHUB_OUTPUT"

      - name: Build and push store image
        run: |
          docker build -t ghcr.io/${{ steps.prep.outputs.repo_lower }}/store:${{ github.sha }} ./store
          docker build -t ghcr.io/${{ steps.prep.outputs.repo_lower }}/store:latest ./store
          docker push ghcr.io/${{ steps.prep.outputs.repo_lower }}/store:${{ github.sha }}
          docker push ghcr.io/${{ steps.prep.outputs.repo_lower }}/store:latest

      - name: Build and push frontend image
        run: |
          docker build -t ghcr.io/${{ steps.prep.outputs.repo_lower }}/frontend:${{ github.sha }} ./frontend
          docker build -t ghcr.io/${{ steps.prep.outputs.repo_lower }}/frontend:latest ./frontend
          docker push ghcr.io/${{ steps.prep.outputs.repo_lower }}/frontend:${{ github.sha }}
          docker push ghcr.io/${{ steps.prep.outputs.repo_lower }}/frontend:latest

      - name: Build and push ai_assistant image
        run: |
          docker build -t ghcr.io/${{ steps.prep.outputs.repo_lower }}/ai_assistant:${{ github.sha }} ./ai_assistant
          docker build -t ghcr.io/${{ steps.prep.outputs.repo_lower }}/ai_assistant:latest ./ai_assistant
          docker push ghcr.io/${{ steps.prep.outputs.repo_lower }}/ai_assistant:${{ github.sha }}
          docker push ghcr.io/${{ steps.prep.outputs.repo_lower }}/ai_assistant:latest

      - name: Build and push language_academy image
        run: |
          docker build -t ghcr.io/${{ steps.prep.outputs.repo_lower }}/language_academy:${{ github.sha }} ./language_academy
          docker build -t ghcr.io/${{ steps.prep.outputs.repo_lower }}/language_academy:latest ./language_academy
          docker push ghcr.io/${{ steps.prep.outputs.repo_lower }}/language_academy:${{ github.sha }}
          docker push ghcr.io/${{ steps.prep.outputs.repo_lower }}/language_academy:latest

      - name: Build and push cargo image
        run: |
          docker build -t ghcr.io/${{ steps.prep.outputs.repo_lower }}/cargo:${{ github.sha }} ./cargo
          docker build -t ghcr.io/${{ steps.prep.outputs.repo_lower }}/cargo:latest ./cargo
          docker push ghcr.io/${{ steps.prep.outputs.repo_lower }}/cargo:${{ github.sha }}
          docker push ghcr.io/${{ steps.prep.outputs.repo_lower }}/cargo:latest

      - name: Build and push hotels image
        run: |
          docker build -t ghcr.io/${{ steps.prep.outputs.repo_lower }}/hotels:${{ github.sha }} ./hotels
          docker build -t ghcr.io/${{ steps.prep.outputs.repo_lower }}/hotels:latest ./hotels
          docker push ghcr.io/${{ steps.prep.outputs.repo_lower }}/hotels:${{ github.sha }}
          docker push ghcr.io/${{ steps.prep.outputs.repo_lower }}/hotels:latest
