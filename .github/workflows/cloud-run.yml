name: Cloud Run CD

on:
  workflow_dispatch:
  push:
    branches: ["main"]

permissions:
  contents: read
  id-token: write

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: ${{ secrets.GCP_REGION }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Enable required APIs
        run: |
          gcloud services enable run.googleapis.com artifactregistry.googleapis.com cloudbuild.googleapis.com secretmanager.googleapis.com

      - name: Create Artifact Registry Repository
        run: |
          gcloud artifacts repositories describe ekioba --location="${GCP_REGION}" --project="${GCP_PROJECT_ID}" || \
          gcloud artifacts repositories create ekioba --repository-format=docker --location="${GCP_REGION}" --description="Ekioba Container Registry" --project="${GCP_PROJECT_ID}"

      - name: Build and Deploy Universal Service
        run: |
          # Build the Universal Container
          gcloud builds submit . --config cloudbuild.universal.yaml --substitutions=_IMAGE="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/ekioba/ekioba-universal",_NEXT_PUBLIC_IYOBO_URL="/chat",_NEXT_PUBLIC_STORE_PRODUCTS_URL="/api/store/products/",_NEXT_PUBLIC_BACKEND_URL="/api" 
          
          # Deploy to Cloud Run
          gcloud run deploy ekioba-universal \
            --image "${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/ekioba/ekioba-universal" \
            --region "${GCP_REGION}" \
            --project "${GCP_PROJECT_ID}" \
            --platform managed \
            --allow-unauthenticated \
            --service-account "ekioba-identity@${GCP_PROJECT_ID}.iam.gserviceaccount.com" \
            --memory 2Gi \
            --cpu 2 \
            --port 8080 \
            --set-secrets "DJANGO_SECRET_KEY=DJANGO_SECRET_KEY:latest,SOLANA_RPC_URL=SOLANA_RPC_URL:latest,TON_API_KEY=TON_API_KEY:latest,COCKROACHDB_STORE_URL=COCKROACHDB_STORE_URL:latest,COCKROACHDB_HOTELS_URL=COCKROACHDB_HOTELS_URL:latest" \
            --set-env-vars "NEXT_PUBLIC_IYOBO_URL=/chat,NEXT_PUBLIC_STORE_PRODUCTS_URL=/api/store/products/"
