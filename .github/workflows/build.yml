name: ci

on:
  push:
    branches:
      - "main"

jobs:
  docker:
    runs-on: ubuntu-latest
    env:
      DOCKER_USER: ${{ vars.DOCKER_USER || secrets.DOCKER_USER }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Docker credentials
        run: |
          if [ -z "${DOCKER_USER}" ]; then
            echo "DOCKER_USER is not set. Configure repository variable DOCKER_USER (preferred) or secret DOCKER_USER."
            exit 1
          fi
          if [ -z "${{ secrets.DOCKER_PAT }}" ]; then
            echo "DOCKER_PAT is not set. Configure repository secret DOCKER_PAT."
            exit 1
          fi

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PAT }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: cloud
          endpoint: "azawalletekioba/ekioba"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          tags: ${{ env.DOCKER_USER }}/docker-build-cloud-demo:latest
          outputs: ${{ github.event_name == 'pull_request' && 'type=cacheonly' || 'type=registry' }}
