name: Pull Docker Image from Docker Hub to GHCR

on:
  workflow_dispatch:
  schedule:
    # Run daily at midnight UTC to keep the mirror in sync
    - cron: '0 0 * * *'
  workflow_run:
    workflows:
      - Build and Push Docker Image
    types:
      - completed

jobs:
  mirror:
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}

    permissions:
      packages: write

    steps:
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image from Docker Hub
        run: docker pull azawalletekioba/ekioba:latest

      - name: Tag image for GHCR
        run: |
          docker tag azawalletekioba/ekioba:latest ghcr.io/${{ github.repository_owner }}/ekioba:latest
          docker tag azawalletekioba/ekioba:latest ghcr.io/${{ github.repository_owner }}/ekioba:${{ github.sha }}

      - name: Push image to GHCR
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/ekioba:latest
          docker push ghcr.io/${{ github.repository_owner }}/ekioba:${{ github.sha }}
