# ─────────────────────────────────────────────────────────────────────────────
# HorizontalPodAutoscalers — all EKIOBA services
#
# Requires: metrics-server installed in the cluster
#   kubectl apply -f https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml
#
# Scale targets:
#   frontend         2–6 replicas  @ 70% CPU
#   store            2–5 replicas  @ 70% CPU
#   ai-assistant     2–6 replicas  @ 60% CPU / 80% memory
#   cargo            1–4 replicas  @ 70% CPU
#   hotels           1–4 replicas  @ 70% CPU
#   language-academy 1–4 replicas  @ 70% CPU
# ─────────────────────────────────────────────────────────────────────────────

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: frontend-hpa
  namespace: ekioba
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: frontend
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300  # wait 5 min before scaling down

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: store-hpa
  namespace: ekioba
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: store
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300

---
