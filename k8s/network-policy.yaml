---
# Allow all pods in the ekioba namespace to make external DNS/internet calls (egress)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-all
  namespace: ekioba
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - {}
