---
# Default deny-all ingress policy — blocks all inbound pod-to-pod traffic unless
# explicitly allowed by the rules below.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: ekioba
spec:
  podSelector: {}
  policyTypes:
    - Ingress

---
# Allow ingress controller → frontend
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-frontend
  namespace: ekioba
spec:
  podSelector:
    matchLabels:
      app: frontend
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - port: 3000
          protocol: TCP

---
# Allow ingress controller → ai-assistant
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-ai-assistant
  namespace: ekioba
spec:
  podSelector:
    matchLabels:
      app: ai-assistant
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
        - podSelector:
            matchLabels:
              app.kubernetes.io/part-of: ekioba
      ports:
        - port: 8005
          protocol: TCP

