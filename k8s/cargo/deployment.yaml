apiVersion: apps/v1
kind: Deployment
metadata:
  name: cargo
  namespace: ekioba
  labels:
    app: cargo
    app.kubernetes.io/part-of: ekioba
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cargo
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: cargo
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: cargo
          # CI replaces this tag on deploy. Never use 'latest' in production.
          image: azawalletekioba/ekioba-cargo:v1.0.0
          imagePullPolicy: Always
          command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8002"]
          ports:
            - name: http
              containerPort: 8002
              protocol: TCP
          env:
            - name: PORT
              value: "8002"
          envFrom:
            - secretRef:
                name: ekioba-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /
              port: 8002
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 8002
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
