apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ekioba-main
  namespace: ekioba
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"

    # Security headers
    nginx.ingress.kubernetes.io/configuration-snippet: |
      add_header X-Frame-Options "SAMEORIGIN" always;
      add_header X-Content-Type-Options "nosniff" always;
      add_header X-XSS-Protection "1; mode=block" always;
      add_header Referrer-Policy "no-referrer-when-downgrade" always;
      add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https:; frame-ancestors 'self';" always;
      add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Rate limiting: 100 requests/second per IP
    nginx.ingress.kubernetes.io/limit-rps: "100"
    nginx.ingress.kubernetes.io/limit-connections: "20"

    # WebSocket support
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/server-snippets: |
      location /chat {
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
      }

    # Proxy settings
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-buffer-size: "16k"

    # Custom headers configmap
    nginx.ingress.kubernetes.io/proxy-set-headers: "ekioba/custom-headers"

    # Force HTTPS redirect
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - ekioba.example.com
      secretName: ekioba-tls
  rules:
    - host: ekioba.example.com
      http:
        paths:
          # Frontend (catch-all)
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-svc
                port:
                  number: 3000
          # AI assistant chat endpoint
          - path: /chat
            pathType: Prefix
            backend:
              service:
                name: ai-assistant-svc
                port:
                  number: 8005
          # Telegram webhook
          - path: /telegram
            pathType: Prefix
            backend:
              service:
                name: ai-assistant-svc
                port:
                  number: 8005
          # AI health check (public)
          - path: /health
            pathType: Exact
            backend:
              service:
                name: ai-assistant-svc
                port:
                  number: 8005
