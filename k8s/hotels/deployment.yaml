apiVersion: apps/v1
kind: Deployment
metadata:
  name: hotels
  namespace: ekioba
  labels:
    app: hotels
    app.kubernetes.io/part-of: ekioba
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hotels
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: hotels
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: hotels
          # CI replaces this tag on deploy. Never use 'latest' in production.
          image: azawalletekioba/ekioba-hotels:v1.0.0
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8003
              protocol: TCP
          env:
            - name: PORT
              value: "8003"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: ekioba-secrets
                  key: HOTELS_DATABASE_URL
          envFrom:
            - secretRef:
                name: ekioba-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /
              port: 8003
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 8003
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
