---
# Pod Disruption Budgets — ensure at least 1 pod available during node drains / upgrades

apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: frontend-pdb
  namespace: ekioba
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: frontend

