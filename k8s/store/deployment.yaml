apiVersion: apps/v1
kind: Deployment
metadata:
  name: store
  namespace: ekioba
  labels:
    app: store
    app.kubernetes.io/part-of: ekioba
spec:
  replicas: 2
  selector:
    matchLabels:
      app: store
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: store
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: store
          # CI replaces this tag on deploy. Never use 'latest' in production.
          image: azawalletekioba/ekioba-store:v1.0.0
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8001
              protocol: TCP
          env:
            - name: PORT
              value: "8001"
            # Map the store-specific DB secret key to the name Django expects
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: ekioba-secrets
                  key: STORE_DATABASE_URL
          envFrom:
            - secretRef:
                name: ekioba-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /
              port: 8001
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 8001
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
