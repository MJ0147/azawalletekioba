apiVersion: apps/v1
kind: Deployment
metadata:
  name: language-academy
  namespace: ekioba
  labels:
    app: language-academy
    app.kubernetes.io/name: language-academy
    app.kubernetes.io/part-of: ekioba
spec:
  replicas: 2
  selector:
    matchLabels:
      app: language-academy
  template:
    metadata:
      labels:
        app: language-academy
        app.kubernetes.io/name: language-academy
        app.kubernetes.io/part-of: ekioba
    spec:
      terminationGracePeriodSeconds: 60
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: language-academy
          image: language-academy:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: ekioba-app-config
          env:
            - name: DJANGO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: ekioba-secrets
                  key: DJANGO_SECRET_KEY
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health/
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health/
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 20
            failureThreshold: 3
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: run
              mountPath: /var/run
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]
      volumes:
        - name: tmp
          emptyDir: {}
        - name: run
          emptyDir: {}
