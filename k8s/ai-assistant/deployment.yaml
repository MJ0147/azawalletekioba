apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-assistant
  namespace: ekioba
  labels:
    app: ai-assistant
    app.kubernetes.io/part-of: ekioba
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-assistant
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: ai-assistant
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: ai-assistant
          # CI replaces this tag on deploy. Never use 'latest' in production.
          image: azawalletekioba/ekioba-ai-assistant:v1.0.0
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8005
              protocol: TCP
          env:
            - name: PORT
              value: "8005"
            # Map the AI-assistant-specific DB secret key to DATABASE_URL
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: ekioba-secrets
                  key: AI_ASSISTANT_DATABASE_URL
          envFrom:
            - secretRef:
                name: ekioba-secrets
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8005
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8005
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
