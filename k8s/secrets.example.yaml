apiVersion: v1
kind: Secret
metadata:
  name: ekioba-secrets
  namespace: ekioba
type: Opaque
stringData:
  # Django / general
  DJANGO_SECRET_KEY: "REPLACE_WITH_SECURE_SECRET_KEY"

  # Database URLs (CockroachDB / PostgreSQL)
  COCKROACHDB_STORE_URL: "postgresql://user:password@host:26257/ekioba_store?sslmode=require"
  COCKROACHDB_HOTELS_URL: "postgresql://user:password@host:26257/ekioba_hotels?sslmode=require"

  # Blockchain
  SOLANA_RPC_URL: "https://api.mainnet-beta.solana.com"
  TON_API_KEY: "REPLACE_WITH_TON_API_KEY"

  # AI service
  OPENAI_API_KEY: "REPLACE_WITH_OPENAI_API_KEY"

  # Email (optional)
  EMAIL_HOST_PASSWORD: "REPLACE_WITH_EMAIL_PASSWORD"
