# ─────────────────────────────────────────────────────────────────────────────
# EKIOBA — Kubernetes Secrets Template
#
# 1. Copy this file:  cp k8s/secrets.example.yaml k8s/secrets.yaml
# 2. Replace every REPLACE_ME value with a real secret.
# 3. Apply:           kubectl apply -f k8s/secrets.yaml
# 4. NEVER commit secrets.yaml to version control (.gitignore covers *.yaml
#    inside k8s/ — add "k8s/secrets.yaml" to .gitignore if not already present).
#
# Generate a secret key:
#   python -c "import secrets; print(secrets.token_hex(32))"
#
# Alternative — create directly from the project .env file:
#   kubectl create secret generic ekioba-secrets \
#     --from-env-file=.env -n ekioba --dry-run=client -o yaml | kubectl apply -f -
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: ekioba-secrets
  namespace: ekioba
type: Opaque
stringData:
  # ── Django ────────────────────────────────────────────────────────
  DJANGO_SECRET_KEY: "REPLACE_ME_50_CHAR_MIN_RANDOM_STRING"
  DEBUG: "False"
  ALLOWED_HOSTS: "ekioba.com,www.ekioba.com"

  # ── JWT / AI Assistant ───────────────────────────────────────────
  # Minimum 32 characters — validated by ai_assistant/config.py SECRET_KEY.
  SECRET_KEY: "REPLACE_ME_32_CHAR_MIN_RANDOM_STRING"

  # ── CORS ──────────────────────────────────────────────────────────
  CORS_ORIGINS: "https://ekioba.com,https://www.ekioba.com"

  # ── Databases ─────────────────────────────────────────────────────
  # Injected per-deployment via env.valueFrom.secretKeyRef so each
  # service container sees it as DATABASE_URL.
  STORE_DATABASE_URL: "postgresql://user:password@db-host:5432/ekioba_store?sslmode=require"
  HOTELS_DATABASE_URL: "postgresql://user:password@db-host:5432/ekioba_hotels?sslmode=require"
  AI_ASSISTANT_DATABASE_URL: "rediss://:password@redis-host:6380/0"
  DJANGO_DB_ENGINE: "postgresql"

  # ── In-cluster service URLs (Kubernetes DNS) ──────────────────────
  STORE_BACKEND_URL: "http://store.ekioba.svc.cluster.local:8001/api/products/"
  STORE_PAYMENTS_URL: "http://store.ekioba.svc.cluster.local:8001/payments/process/"
  AI_ASSISTANT_URL: "http://ai-assistant.ekioba.svc.cluster.local:8005"
  FRONTEND_IYOBO_URL: "/chat"

  # ── TON Blockchain ────────────────────────────────────────────────
  TON_API_KEY: "REPLACE_ME"
  TONPAY_API_KEY: "REPLACE_ME"
  TON_MERCHANT_WALLET: "REPLACE_ME"
  TON_CONTRACT_ADDRESS: "REPLACE_ME"

  # ── Solana Blockchain ─────────────────────────────────────────────
  SOLANA_RPC_URL: "https://api.mainnet-beta.solana.com"
  SOLANA_API_KEY: "REPLACE_ME"
  SOLANA_MERCHANT_WALLET: "REPLACE_ME"

  # ── External APIs ─────────────────────────────────────────────────
  GEMINI_API_KEY: "REPLACE_ME"
  COPILOT_API_KEY: "REPLACE_ME"
  COPILOT_ENDPOINT: "https://api.openai.com/v1"
  COPILOT_MODEL: "gpt-4o"
  TELEGRAM_BOT_TOKEN: "REPLACE_ME"
  GOOGLE_GENAI_API_KEY: "REPLACE_ME"
