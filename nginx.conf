worker_processes 1;

events { worker_connections 1024; }

http {
    include    /etc/nginx/mime.types;
    default_type application/octet-stream;
    access_log /dev/stdout;
    error_log  /dev/stderr;
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 20M;

    server {
        listen 8080;
        
        # Proxy Headers
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Frontend (Next.js)
        location / {
            proxy_pass http://127.0.0.1:3000;
        }

        # Store Service
        location /api/store/ {
            # Keep root for Admin, Payments, Health; prepend /api/ for everything else
            rewrite ^/api/store/((admin|payments|health).*) /$1 break;
            rewrite ^/api/store/(.*) /api/$1 break;
            proxy_pass http://127.0.0.1:8001;
            proxy_redirect off;
        }

        # Cargo Service
        location /api/cargo/ {
            rewrite ^/api/cargo/(.*) /$1 break;
            proxy_pass http://127.0.0.1:8002;
            proxy_redirect off;
        }

        # Hotels (Tourism) Service
        location /api/hotels/ {
            rewrite ^/api/hotels/(.*) /$1 break;
            proxy_pass http://127.0.0.1:8003;
            proxy_redirect off;
        }

        # Language Academy
        location /api/academy/ {
            rewrite ^/api/academy/(.*) /$1 break;
            proxy_pass http://127.0.0.1:8004;
            proxy_redirect off;
        }

        # AI Assistant (Iyobo)
        location /api/ai/ {
            rewrite ^/api/ai/(.*) /$1 break;
            proxy_pass http://127.0.0.1:8005;
            proxy_redirect off;
        }
        
        # Chat specific route for AI
        location /chat {
            proxy_pass http://127.0.0.1:8005;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # Django Static Files
        # Serves admin panel CSS/JS collected by the Store service
        location /static/ {
            alias /app/store/staticfiles/;
            expires 30d;
            add_header Cache-Control "public, no-transform";
        }

        # Health Check
        location /healthz {
            return 200 'OK';
        }
    }
}
