events {

worker_connections 1024;

}

http {

server {

    listen 80;

    # Frontend

    location / {

        proxy_pass http://frontend:3000;

        proxy_set_header Host $host;

        proxy_set_header X-Real-IP $remote_addr;

        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;

        proxy_set_header Connection "upgrade";

        proxy_cache_bypass $http_upgrade;

    }

    # AI Assistant (Iyobo)

    location /chat {

        proxy_pass http://ai_assistant:8080/chat;

    }

    location /telegram/ {

        proxy_pass http://ai_assistant:8080/telegram/;

    }

    # Language Academy (Edo Academy)

    location /api/academy/ {

        rewrite ^/api/academy/(.*) /$1 break;

        proxy_pass http://language_academy:8004;

    }

    # Store / Idia Coin Payments

    location /api/store/ {

        rewrite ^/api/store/(.*) /$1 break;

        proxy_pass http://store:8000;

    }

    # Hotels & Tourism

    location /api/hotels/ {

        rewrite ^/api/hotels/(.*) /$1 break;

        proxy_pass http://hotels:8000;

    }

    # Caching and Compression for Frontend Assets

    location ~* .(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {

        expires 30d;

        add_header Cache-Control "public, no-transform";

        access_log off;

        gzip on;

        gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    }

    # Security Headers

    add_header X-Content-Type-Options nosniff;

    add_header X-Frame-Options SAMEORIGIN;

    add_header X-XSS-Protection "1; mode=block";

    add_header Referrer-Policy no-referrer-when-downgrade;

    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self' ws: wss:;";

    # Rate Limiting

    limit_req_zone $binary_remote_addr zone=mylimit:10m rate=10r/s;

    limit_req zone=mylimit burst=20 nodelay;

    # Request Size Limit

    client_max_body_size 10M;

    # Custom Error Pages

    error_page 404 /404.html;

    error_page 500 502 503 504 /50x.html;

    location = /50x.html {

        root /usr/share/nginx/html;

    }

}

}

ss http://ai_assistant:8080/chat;

