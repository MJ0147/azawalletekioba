steps:
- name: gcr.io/cloud-builders/docker
  args:
  - build
  - -f
  - Dockerfile.universal
  - -t
  - ${_IMAGE}
  - --build-arg
  - NEXT_PUBLIC_IYOBO_URL=${_NEXT_PUBLIC_IYOBO_URL}
  - --build-arg
  - NEXT_PUBLIC_STORE_PRODUCTS_URL=${_NEXT_PUBLIC_STORE_PRODUCTS_URL}
  - --build-arg
  - NEXT_PUBLIC_BACKEND_URL=${_NEXT_PUBLIC_BACKEND_URL}
  - .
- name: gcr.io/cloud-builders/docker
  args:
  - push
  - ${_IMAGE}
images:
- ${_IMAGE}
