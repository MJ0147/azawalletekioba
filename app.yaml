# app.yaml  (save in your repo root)
name: ekioba-app
region: nyc
services:
  - name: web
    image:
      registry: docker.io
      registry_type: DOCKER_HUB
      repository: azawalletekioba/ekioba
      tag: tagname
    # no custom run_command – let App Platform detect it
    instance_size_slug: starter
    instance_count: 1
    envs:
      - key: PYTHONPATH
        value: /app
    http_port: 8080
    health_check:
      http_path: /health
      initial_delay_seconds: 30
