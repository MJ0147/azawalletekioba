<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}EKIOBA{% endblock %}</title>
  <meta name="description" content="{% block description %}EKIOBA — Edo cultural marketplace, AI-powered forecasts, and blockchain payments.{% endblock %}" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', path='css/styles.css') }}" />
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/htmx.org@1.9.12/dist/htmx.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <script defer src="{{ url_for('static', path='js/app.js') }}"></script>
  {% block head %}{% endblock %}
</head>
<body>

  <!-- ── Site Header / Nav ──────────────────────────────────────────────── -->
  <header class="site-header">
    <nav class="site-nav" x-data="{ open: false }" aria-label="Main navigation">
      <a class="nav-logo" href="/">
        <span class="nav-logo-mark" aria-hidden="true">⬡</span>
        EKIOBA
      </a>
      <button class="nav-toggle"
              @click="open = !open"
              :aria-expanded="open.toString()"
              aria-controls="site-nav-links"
              aria-label="Toggle menu">
        <span x-text="open ? '✕' : '☰'">☰</span>
      </button>
      <ul class="nav-links" id="site-nav-links" :class="{ 'is-open': open }" role="list">
        <li><a href="/">Home</a></li>
        <li><a href="/#store">Store</a></li>
        <li><a href="/dashboard">Dashboard</a></li>
        <li><a href="/wallet-dashboard">Wallet</a></li>
        <li><a href="/chat">AI&nbsp;Chat</a></li>
        <li>
          <a href="/wallet-dashboard" class="cart-link" aria-label="Shopping cart">
            🛒 <span id="cart-count" hidden aria-live="polite">0</span>
          </a>
        </li>
      </ul>
    </nav>
  </header>

  <!-- ── Main Content ───────────────────────────────────────────────────── -->
  <main id="main-content">
    {% block content %}{% endblock %}
  </main>

  <!-- ── Site Footer ────────────────────────────────────────────────────── -->
  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-brand">
        <span class="nav-logo-mark" aria-hidden="true">⬡</span>
        <strong>EKIOBA</strong>
        <p>Rooted in the Edo Kingdom. Powered by Azure &amp; Web3.</p>
      </div>
      <nav class="footer-links" aria-label="Footer navigation">
        <a href="/">Home</a>
        <a href="/#store">Store</a>
        <a href="/dashboard">Dashboard</a>
        <a href="/wallet-dashboard">Wallet</a>
        <a href="/chat">AI Chat</a>
      </nav>
      <p class="footer-copy">&copy; 2026 EKIOBA. All rights reserved.</p>
    </div>
  </footer>

</body>
</html>
