name: ekioba
services:
  - name: backend
    image:
      registry: docker.io
      repository: __DOCKER_USERNAME__/backend
      tag: __TAG__
    http_port: 8000
    envs:
      - key: DJANGO_SECRET_KEY
        type: SECRET
      - key: STORE_URL
        type: SECRET
      - key: HOTELS_URL
        type: SECRET
      - key: TON_API_KEY
        type: SECRET
      - key: SOLANA_API_KEY
        type: SECRET

  - name: frontend-api
    image:
      registry: docker.io
      repository: __DOCKER_USERNAME__/frontend
      tag: __TAG__
    envs:
      - key: NEXT_PUBLIC_BACKEND_URL
        value: "https://python-api-653036098161.us-central1.run.app"

  - name: frontend-public
    image:
      registry: docker.io
      repository: __DOCKER_USERNAME__/frontend
      tag: __TAG__
    http_port: 3000
